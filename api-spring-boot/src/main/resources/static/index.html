<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Étudiants</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .content {
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #3498db;
            color: white;
        }
        tr:hover {
            background-color: #f5f5f5;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }
        .error {
            background: #e74c3c;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .refresh-btn:hover {
            background: #2980b9;
        }
        .badge {
            background: #2ecc71;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📚 Gestion des Étudiants</h1>
        <p>Liste des étudiants inscrits</p>
    </div>
    <div class="content">
        <button class="refresh-btn" onclick="loadEtudiants()">🔄 Actualiser</button>
        <div id="result">
            <div class="loading">Chargement des étudiants...</div>
        </div>
    </div>
</div>

<script>
    async function loadEtudiants() {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = '<div class="loading">Chargement...</div>';

        try {
            const response = await fetch('/api/etudiants');

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const etudiants = await response.json();

            if (etudiants.length === 0) {
                resultDiv.innerHTML = '<div class="loading">📭 Aucun étudiant trouvé</div>';
                return;
            }

            // Construction du tableau HTML
            let html = `
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>CIN</th>
                                <th>Nom complet</th>
                                <th>Date de naissance</th>
                                <th>Âge</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

            etudiants.forEach(e => {
                // Formater la date
                const dateNaissance = e.dateNaissance ? e.dateNaissance.split('-').reverse().join('/') : 'N/A';

                html += `
                        <tr>
                            <td>${e.id}</td>
                            <td>${e.cin}</td>
                            <td><strong>${e.nom}</strong></td>
                            <td>${dateNaissance}</td>
                            <td><span class="badge">${calculateAge(e.dateNaissance)} ans</span></td>
                        </tr>
                    `;
            });

            html += `
                        </tbody>
                    </table>
                    <p style="margin-top: 20px; text-align: center; color: #666;">
                        📊 Total: ${etudiants.length} étudiant(s)
                    </p>
                `;

            resultDiv.innerHTML = html;

        } catch (error) {
            resultDiv.innerHTML = `
                    <div class="error">
                        ❌ Erreur de connexion à l'API<br>
                        <small>${error.message}</small>
                    </div>
                `;
            console.error('Erreur:', error);
        }
    }

    function calculateAge(dateString) {
        if (!dateString) return '?';
        const birthDate = new Date(dateString);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        return age;
    }

    // Charger au chargement de la page
    loadEtudiants();

    // Rafraîchir toutes les 30 secondes
    setInterval(loadEtudiants, 30000);
</script>
</body>
</html>
